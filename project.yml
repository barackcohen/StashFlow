name: StockPortfolios
options:
  bundleIdPrefix: com.barackcohen
  createSharedSchemes: true
targets:
  StockTrackerCore:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/StockTrackerCore
    settings:
      GENERATE_INFOPLIST_FILE: YES

  StockPortfolios:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        excludes:
          - Widget
          - Info.plist
          - StockPortfolios.entitlements
    dependencies:
      - target: StockTrackerCore
      - target: PortfolioWidgetExtension
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_FILE: App/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.barackcohen.StockPortfolios
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      CODE_SIGN_ENTITLEMENTS: App/StockPortfolios.entitlements
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      INFOPLIST_KEY_CFBundleDisplayName: StashFlow
      INFOPLIST_KEY_CFBundleName: StashFlow

  PortfolioWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Widget
        excludes:
          - PortfolioWidgetExtension.entitlements
      - path: App/Shared
    dependencies:
      - target: StockTrackerCore
    settings:
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_FILE: App/Widget/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.barackcohen.StockPortfolios.Widget
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      CODE_SIGN_ENTITLEMENTS: App/Widget/PortfolioWidgetExtension.entitlements
